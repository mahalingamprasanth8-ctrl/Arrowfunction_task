<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES6 Basic</title>
</head>
<body>
    <h1 id="demo" style="width: 50%; height: 100px; background-color: antiquewhite;"></h1>
    <h2 id="demo2" style="width: 50%; height: 100px; background-color: aqua;"></h2>
    <h3 id="demo3" style="width: 50%; height: 100px; background-color: grey;"></h3>

    <script>
        const fruits = ["apple","orange","mango"];

        const [firstfruit,seconfruit] = fruits;
        console.log('fruits: ${firstfruit},${seconfruit}');


        const score = 85;
        const result = score >= 50 ? "pass" : "fail";

        console.log("result:",result);


        document.getElementById("demo").innerHTML=result;


        const arr1 = [1,2,3];
        const arr2 = [4,5,6];
        const combained = [...arr1,...arr2];
        console.log("combined Array Using Spread:",combained);
        document.getElementById("demo2").innerHTML=combained;

        const student = { id: 101, name: "john"};
        const mark = {math: 90,science: 85};
        const fulldetails = {student,mark};
        console.log("student details with spread:",fulldetails);
        document.getElementById("demo3").innerHTML=fulldetails.mark.science;

    </script>
    
</body>
</html>
